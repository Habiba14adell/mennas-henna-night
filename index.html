<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menna's Bachelorette Party</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --burgundy:#53181f;
    --burgundy-light:#7a2631;
    --black:#050505;
    --soft:#fff4f1;
    --gold:#d5a652;
}

body{
    min-height:100vh;
    overflow:hidden;
    background:var(--black);
    font-family:Garamond, Georgia, serif;
    color:var(--soft);
}

button{
    font:inherit;
}

.loading-page{
    position:fixed;
    inset:0;
    z-index:30;
    display:grid;
    place-items:center;
    padding:24px;
    background:
        radial-gradient(circle at 50% 30%, rgba(122,38,49,.5), transparent 34%),
        linear-gradient(145deg, var(--black), var(--burgundy) 52%, var(--black));
    transition:opacity .8s ease, visibility .8s ease;
}

.loading-page.is-hidden{
    opacity:0;
    visibility:hidden;
}

.loading-content{
    text-align:center;
    color:white;
}

.loading-icon{
    width:92px;
    height:92px;
    margin:0 auto 26px;
    border:3px solid rgba(255,255,255,.25);
    border-top-color:var(--gold);
    border-radius:50%;
    display:grid;
    place-items:center;
    animation:spin 1.1s linear infinite;
}

.loading-icon span{
    width:48px;
    height:48px;
    border-radius:50%;
    background:var(--burgundy);
    border:2px solid var(--gold);
    box-shadow:0 0 30px rgba(213,166,82,.45);
}

.loading-content h1{
    font-size:clamp(2.5rem, 8vw, 5.5rem);
    line-height:.95;
}

.loading-content p{
    margin-top:18px;
    font-size:clamp(1rem, 3vw, 1.35rem);
    letter-spacing:3px;
    text-transform:uppercase;
}

.touch-page{
    min-height:100vh;
    display:grid;
    place-items:center;
    padding:24px;
    background:
        linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.85)),
        radial-gradient(circle at 50% 15%, rgba(83,24,31,.9), transparent 40%),
        var(--black);
}

.touch-button{
    width:min(440px, 100%);
    border:0;
    background:transparent;
    color:var(--soft);
    cursor:pointer;
    text-align:center;
}

.cartoon{
    width:min(260px, 74vw);
    height:320px;
    margin:0 auto 22px;
    position:relative;
    filter:drop-shadow(0 26px 45px rgba(0,0,0,.55));
    animation:float 2.8s ease-in-out infinite;
}

.hair{
    position:absolute;
    width:138px;
    height:154px;
    left:61px;
    top:26px;
    background:#1a0908;
    border-radius:70px 70px 54px 54px;
}

.face{
    position:absolute;
    width:110px;
    height:116px;
    left:75px;
    top:54px;
    background:#d99a78;
    border-radius:55px 55px 48px 48px;
    border:3px solid #2b0d10;
}

.eye{
    position:absolute;
    width:10px;
    height:10px;
    top:98px;
    background:#111;
    border-radius:50%;
}

.eye.left{
    left:105px;
}

.eye.right{
    right:105px;
}

.smile{
    position:absolute;
    width:34px;
    height:18px;
    left:113px;
    top:124px;
    border-bottom:3px solid #6d1d24;
    border-radius:0 0 40px 40px;
}

.dress{
    position:absolute;
    width:150px;
    height:150px;
    left:55px;
    top:158px;
    background:linear-gradient(160deg, var(--burgundy), #130507);
    clip-path:polygon(50% 0, 100% 100%, 0 100%);
    border-bottom:8px solid var(--gold);
}

.arm{
    position:absolute;
    width:80px;
    height:16px;
    top:182px;
    background:#d99a78;
    border-radius:20px;
}

.arm.left{
    left:20px;
    transform:rotate(22deg);
}

.arm.right{
    right:20px;
    transform:rotate(-22deg);
}

.henna-dot{
    position:absolute;
    width:7px;
    height:7px;
    top:184px;
    border-radius:50%;
    background:var(--gold);
}

.henna-dot.one{
    left:43px;
}

.henna-dot.two{
    right:43px;
}

.touch-button strong{
    display:block;
    font-size:clamp(2rem, 8vw, 4rem);
    line-height:1;
}

.touch-button span{
    display:block;
    margin-top:12px;
    font-size:clamp(1rem, 3vw, 1.25rem);
    letter-spacing:2px;
    text-transform:uppercase;
    color:#f1d7c7;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-12px);
    }
}

</style>
</head>
<body>

<section class="loading-page" id="loadingPage" aria-label="Loading invitation">
    <div class="loading-content">
        <div class="loading-icon" aria-hidden="true"><span></span></div>
        <h1>Menna's<br>Bachelorette Party</h1>
        <p>Loading your invitation</p>
    </div>
</section>

<section class="touch-page" aria-label="Open invitation">
    <button class="touch-button" id="openInvitation" type="button">
        <div class="cartoon" aria-hidden="true">
            <div class="hair"></div>
            <div class="face"></div>
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="smile"></div>
            <div class="arm left"></div>
            <div class="arm right"></div>
            <div class="henna-dot one"></div>
            <div class="henna-dot two"></div>
            <div class="dress"></div>
        </div>
        <strong>Touch Me</strong>
        <span>to open your invitation</span>
    </button>
</section>

<script>

const loadingPage = document.getElementById("loadingPage");
const openInvitation = document.getElementById("openInvitation");

window.addEventListener("load", () => {
    setTimeout(() => {
        loadingPage.classList.add("is-hidden");
    }, 1800);
});

openInvitation.addEventListener("click", () => {
    window.location.href = "invitation.html";
});

</script>

</body>
</html>
